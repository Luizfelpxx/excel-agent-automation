<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Agent Machine Counter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Agent Machine Counter</h1>
            <p class="subtitle">Automação de contagem de máquinas por severidade</p>
        </header>

        <div class="content">
            <!-- Configurações da API -->
            <section class="section">
                <h2>⚙️ Configurações da API</h2>
                <div class="form-group">
                    <label for="apiUrl">URL da API:</label>
                    <input 
                        type="text" 
                        id="apiUrl" 
                        placeholder="http://localhost:5000" 
                        value="http://localhost:5000"
                    />
                </div>
                <button id="testConnection" class="btn btn-secondary">Testar Conexão</button>
                <div id="connectionStatus" class="status-message"></div>
            </section>

            <!-- Carregamento de Dados -->
            <section class="section">
                <h2>📥 Carregar Dados</h2>
                
                <div class="form-group">
                    <label for="agentSelect">Selecionar Agente:</label>
                    <select id="agentSelect">
                        <option value="">-- Selecione um agente --</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="monthSelect">Mês:</label>
                        <select id="monthSelect">
                            <option value="1">Janeiro</option>
                            <option value="2">Fevereiro</option>
                            <option value="3">Março</option>
                            <option value="4">Abril</option>
                            <option value="5">Maio</option>
                            <option value="6">Junho</option>
                            <option value="7">Julho</option>
                            <option value="8">Agosto</option>
                            <option value="9">Setembro</option>
                            <option value="10">Outubro</option>
                            <option value="11">Novembro</option>
                            <option value="12">Dezembro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="yearSelect">Ano:</label>
                        <input type="number" id="yearSelect" value="2024" min="2000" max="2100" />
                    </div>
                </div>

                <button id="loadData" class="btn btn-primary">📊 Carregar Relatório</button>
            </section>

            <!-- Inserção de Dados -->
            <section class="section">
                <h2>📤 Inserir Máquina</h2>
                
                <div class="form-group">
                    <label for="newAgentSelect">Agente:</label>
                    <select id="newAgentSelect"></select>
                </div>

                <div class="form-group">
                    <label for="machineName">Nome da Máquina:</label>
                    <input type="text" id="machineName" placeholder="Ex: SERVER-001" />
                </div>

                <div class="form-group">
                    <label for="machineSeverity">Severidade:</label>
                    <select id="machineSeverity">
                        <option value="">-- Selecione --</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Critical">Critical</option>
                        <option value="Low">Low</option>
                        <option value="Not Reported">Not Reported</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="newMachineMonth">Mês:</label>
                        <select id="newMachineMonth">
                            <option value="1">Janeiro</option>
                            <option value="2">Fevereiro</option>
                            <option value="3">Março</option>
                            <option value="4">Abril</option>
                            <option value="5">Maio</option>
                            <option value="6">Junho</option>
                            <option value="7">Julho</option>
                            <option value="8">Agosto</option>
                            <option value="9">Setembro</option>
                            <option value="10">Outubro</option>
                            <option value="11">Novembro</option>
                            <option value="12">Dezembro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="newMachineYear">Ano:</label>
                        <input type="number" id="newMachineYear" value="2024" min="2000" max="2100" />
                    </div>
                </div>

                <button id="addMachine" class="btn btn-success">➕ Adicionar Máquina</button>
            </section>

            <!-- Resultado -->
            <section class="section">
                <h2>📋 Resultado</h2>
                <div id="result" class="result-box"></div>
            </section>
        </div>

        <footer class="footer">
            <p>Excel Agent Automation v1.0.0</p>
        </footer>
    </div>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="taskpane.js"></script>
</body>
</html>
